<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — KTC Dashboard</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2236;
            --border: rgba(148, 163, 184, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #f97316;
            --accent-glow: rgba(249, 115, 22, 0.15);
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(249, 115, 22, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 70%, rgba(59, 130, 246, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse 800px 600px at 50% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(148, 163, 184, 0.03),
                0 25px 60px rgba(0, 0, 0, 0.4),
                0 0 100px rgba(249, 115, 22, 0.03);
            animation: cardFadeIn 0.6s ease-out;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo */
        .logo-section {
            margin-bottom: 32px;
        }

        .logo-icon-wrapper {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.15), rgba(249, 115, 22, 0.05));
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            0% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.1); }
            100% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.2); }
        }

        .logo-icon-wrapper svg {
            width: 32px;
            height: 32px;
            color: var(--accent);
        }

        .logo-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .logo-version {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        /* Google button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            background: var(--bg-card-hover);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .google-btn:hover {
            background: rgba(249, 115, 22, 0.08);
            border-color: rgba(249, 115, 22, 0.3);
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.1);
            transform: translateY(-1px);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Domain hint */
        .domain-hint {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .domain-hint .lock-icon {
            width: 13px;
            height: 13px;
            opacity: 0.6;
        }

        /* Error message */
        .error-message {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            line-height: 1.5;
            display: none;
            animation: errorFadeIn 0.3s ease;
        }

        .error-message.visible {
            display: block;
        }

        @keyframes errorFadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message .error-icon {
            display: inline-block;
            margin-right: 4px;
        }

        /* Footer */
        .login-footer {
            margin-top: 32px;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                border-radius: 16px;
            }
            .logo-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </div>
                <h1 class="logo-title">KTC Dashboard <span class="logo-version">v3.0</span></h1>
                <p class="login-subtitle">Giám sát vận hành Kho Chuyển Tiếp<br>Đăng nhập để tiếp tục</p>
            </div>

            <div class="divider"></div>

            <!-- Google Sign-In Button -->
            <a href="/auth/login" class="google-btn" id="googleLoginBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Đăng nhập bằng Google
            </a>

            <!-- Domain hint -->
            <div class="domain-hint">
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Chỉ cho phép email @ghn.vn
            </div>

            <!-- Error messages -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Footer -->
            <div class="login-footer">
                Kho Chuyển Tiếp — 20757000
            </div>
        </div>
    </div>

    <script>
        // Show error message based on URL parameter
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const errorEl = document.getElementById('errorMessage');

        const errorMessages = {
            'domain': '⛔ Email của bạn không thuộc domain @ghn.vn. Vui lòng đăng nhập bằng email công ty.',
            'oauth': '❌ Đăng nhập Google bị từ chối hoặc đã hủy. Vui lòng thử lại.',
            'no_code': '❌ Không nhận được mã xác thực từ Google. Vui lòng thử lại.',
            'token_failed': '❌ Lỗi xác thực với Google. Vui lòng thử lại sau.',
            'no_token': '❌ Lỗi nhận token từ Google. Vui lòng thử lại.',
            'userinfo_failed': '❌ Không thể lấy thông tin tài khoản Google. Vui lòng thử lại.',
            'unverified': '⛔ Email chưa được xác minh bởi Google. Vui lòng xác minh email trước.',
            'server_error': '❌ Lỗi hệ thống. Vui lòng thử lại sau hoặc liên hệ quản trị viên.',
            'expired': '⏰ Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.',
        };

        if (error && errorMessages[error]) {
            errorEl.textContent = errorMessages[error];
            errorEl.classList.add('visible');
        }
    </script>
</body>
</html>
